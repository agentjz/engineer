<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="智能体工程文档的静态单页阅读页。" />
    <title>智能体工程文档</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="libs/marked.min.js"></script>
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <div class="page" id="page">
      <main class="main-column">
        <section class="doc-card" id="constitution">
          <article class="markdown-body" id="doc-constitution"></article>
        </section>

        <section class="doc-card" id="prompts">
          <article class="markdown-body" id="doc-prompts"></article>
        </section>
      </main>

      <aside class="detail-panel is-hidden" id="detailPanel" aria-label="子文档阅读区">
        <div class="detail-head">
          <button class="back-button" id="closeDetail" type="button">返回主文档</button>
          <h2 id="detailTitle"></h2>
        </div>
        <article class="markdown-body detail-body" id="detailContent"></article>
      </aside>
    </div>
  </body>
</html>
