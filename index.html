<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="智能体工程文档的静态单页阅读页，支持白天和黑夜模式切换。"
    />
    <title>智能体工程文档</title>
    <script src="assets/theme.js"></script>
    <link rel="stylesheet" href="libs/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="assets/styles.css" />
    <script defer src="libs/marked.min.js"></script>
    <script defer src="assets/app.js"></script>
  </head>
  <body>
    <div class="page" id="page">
      <main class="main-column">
        <div class="page-top">
          <a href="#" class="theme-link" id="themeToggleLink">切换到黑夜模式</a>
        </div>

        <section class="doc-card" id="constitution">
          <article class="markdown-body" id="doc-constitution"></article>
        </section>

        <section class="doc-card" id="prompts">
          <article class="markdown-body" id="doc-prompts"></article>
        </section>
      </main>
    </div>

    <div class="detail-modal is-hidden" id="detailModal" aria-hidden="true">
      <div class="detail-backdrop" id="detailBackdrop"></div>
      <aside
        class="detail-panel"
        id="detailPanel"
        aria-label="子文档阅读区"
        aria-labelledby="detailTitle"
        aria-modal="true"
        role="dialog"
      >
        <div class="detail-head">
          <button class="btn btn-outline-secondary btn-sm back-button" id="closeDetail" type="button">
            关闭详情
          </button>
          <h2 id="detailTitle"></h2>
        </div>
        <article class="markdown-body detail-body" id="detailContent"></article>
      </aside>
    </div>
  </body>
</html>
